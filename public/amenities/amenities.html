<!-- =====================================================================
  Dillard Mill — Book the Farm: Amenities grid
  Paste this entire snippet into a Squarespace Code Block.
  All styles are scoped under .dm-amenities so they won't leak.
  No external assets, no JS, fully responsive.
===================================================================== -->
<style>
  .dm-amenities {
    --dm-bg: #F2E8D0;
    --dm-ink: #2F3A28;
    --dm-rule: rgba(47, 58, 40, 0.18);
    background: var(--dm-bg);
    color: var(--dm-ink);
    padding: clamp(28px, 5vw, 64px) clamp(20px, 4vw, 56px);
    border-radius: 6px;
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
    line-height: 1.25;
    container-type: inline-size;
  }
  .dm-amenities__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: clamp(24px, 4cqi, 64px);
    row-gap: 0;
  }
  .dm-amenities__item {
    display: grid;
    grid-template-columns: clamp(72px, 11cqi, 132px) 1fr;
    align-items: center;
    gap: clamp(18px, 2.5cqi, 36px);
    padding: clamp(20px, 3.2cqi, 40px) 0;
    border-bottom: 1px solid var(--dm-rule);
  }
  /* hide the last row's bottom rule per column */
  .dm-amenities__item:nth-last-child(-n+2):nth-child(odd),
  .dm-amenities__item:nth-last-child(1) {
    border-bottom: 0;
  }
  /* vertical divider between columns */
  .dm-amenities__grid > .dm-amenities__item:nth-child(odd) {
    padding-right: clamp(12px, 2cqi, 32px);
    border-right: 1px solid var(--dm-rule);
  }
  .dm-amenities__grid > .dm-amenities__item:nth-child(even) {
    padding-left: clamp(12px, 2cqi, 32px);
  }
  .dm-amenities__icon {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 132px;
    color: var(--dm-ink);
    justify-self: center;
  }
  .dm-amenities__icon svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }
  .dm-amenities__label {
    font-size: clamp(20px, 3.2cqi, 34px);
    font-weight: 500;
    letter-spacing: 0.01em;
    margin: 0;
  }
  /* Single column on narrow screens */
  @container (max-width: 640px) {
    .dm-amenities__grid { grid-template-columns: 1fr; }
    .dm-amenities__grid > .dm-amenities__item:nth-child(odd) {
      padding-right: 0;
      border-right: 0;
    }
    .dm-amenities__grid > .dm-amenities__item:nth-child(even) {
      padding-left: 0;
    }
    .dm-amenities__item { border-bottom: 1px solid var(--dm-rule); }
    .dm-amenities__item:last-child { border-bottom: 0; }
  }
  /* Fallback for browsers without container queries */
  @media (max-width: 640px) {
    .dm-amenities__grid { grid-template-columns: 1fr; }
    .dm-amenities__grid > .dm-amenities__item:nth-child(odd) {
      padding-right: 0;
      border-right: 0;
    }
    .dm-amenities__grid > .dm-amenities__item:nth-child(even) {
      padding-left: 0;
    }
  }
</style>
