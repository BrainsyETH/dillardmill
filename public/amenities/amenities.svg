<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .bg { fill: #F2E8D0; }
      .stroke { fill: none; stroke: #2F3A28; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-thin { fill: none; stroke: #2F3A28; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .divider { stroke: #2F3A28; stroke-width: 1.2; opacity: 0.35; }
      .vdivider { stroke: #2F3A28; stroke-width: 1.2; opacity: 0.35; }
      .label { fill: #2F3A28; font-size: 38px; }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" width="1600" height="900"/>

  <!-- subtle border inset -->
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#2F3A28" stroke-width="1.2" opacity="0.25"/>

  <!-- vertical divider -->
  <line class="vdivider" x1="800" y1="120" x2="800" y2="780"/>

  <!-- horizontal dividers -->
  <line class="divider" x1="100" y1="280" x2="1500" y2="280"/>
  <line class="divider" x1="100" y1="450" x2="1500" y2="450"/>
  <line class="divider" x1="100" y1="620" x2="1500" y2="620"/>

  <!-- ============ ROW 1 LEFT: Airstream ============ -->
  <g transform="translate(170,140)">
    <!-- airstream body: rounded capsule -->
    <path class="stroke" d="M10 90 Q10 30 80 30 L210 30 Q260 30 265 70 L265 110 Q265 120 255 120 L25 120 Q10 120 10 110 Z"/>
    <!-- door -->
    <rect class="stroke-thin" x="120" y="55" width="40" height="60" rx="4"/>
    <!-- windows -->
    <rect class="stroke-thin" x="40" y="55" width="55" height="25" rx="4"/>
    <rect class="stroke-thin" x="190" y="55" width="55" height="25" rx="4"/>
    <!-- hitch -->
    <path class="stroke-thin" d="M265 95 L295 110"/>
    <!-- wheel -->
    <circle class="stroke" cx="80" cy="130" r="18"/>
    <circle cx="80" cy="130" r="6" fill="#2F3A28"/>
  </g>
  <text class="label" x="540" y="180">Unique Airstream</text>
  <text class="label" x="540" y="230">Accommodations</text>

  <!-- ============ ROW 1 RIGHT: 30amp RV hookups ============ -->
  <g transform="translate(870,135)">
    <!-- RV body -->
    <rect class="stroke" x="10" y="40" width="200" height="90" rx="10"/>
    <!-- cab -->
    <path class="stroke" d="M210 70 L260 70 L260 130 L210 130"/>
    <!-- windshield -->
    <line class="stroke-thin" x1="218" y1="78" x2="252" y2="78"/>
    <line class="stroke-thin" x1="218" y1="78" x2="218" y2="105"/>
    <line class="stroke-thin" x1="252" y1="78" x2="252" y2="105"/>
    <line class="stroke-thin" x1="218" y1="105" x2="252" y2="105"/>
    <!-- side windows -->
    <rect class="stroke-thin" x="25" y="55" width="50" height="28" rx="3"/>
    <rect class="stroke-thin" x="90" y="55" width="50" height="28" rx="3"/>
    <rect class="stroke-thin" x="155" y="55" width="45" height="28" rx="3"/>
    <!-- door -->
    <rect class="stroke-thin" x="155" y="90" width="30" height="40" rx="2"/>
    <!-- wheels -->
    <circle class="stroke" cx="50" cy="140" r="16"/>
    <circle cx="50" cy="140" r="5" fill="#2F3A28"/>
    <circle class="stroke" cx="220" cy="140" r="16"/>
    <circle cx="220" cy="140" r="5" fill="#2F3A28"/>
    <!-- hookup pedestal -->
    <rect class="stroke" x="295" y="70" width="30" height="80" rx="3"/>
    <circle class="stroke-thin" cx="310" cy="95" r="6"/>
    <circle class="stroke-thin" cx="310" cy="120" r="6"/>
    <line class="stroke-thin" x1="325" y1="100" x2="350" y2="100"/>
    <path class="stroke-thin" d="M350 100 Q360 105 350 115"/>
  </g>
  <text class="label" x="1280" y="180">30amp</text>
  <text class="label" x="1280" y="230">RV hookups</text>

  <!-- ============ ROW 2 LEFT: Cabin / Private Bathrooms ============ -->
  <g transform="translate(180,310)">
    <!-- cabin body -->
    <rect class="stroke" x="20" y="60" width="220" height="110"/>
    <!-- roof -->
    <path class="stroke" d="M0 60 L130 0 L260 60 Z"/>
    <!-- chimney -->
    <rect class="stroke-thin" x="195" y="15" width="20" height="35"/>
    <!-- door -->
    <rect class="stroke-thin" x="100" y="100" width="40" height="70" rx="2"/>
    <circle cx="132" cy="135" r="3" fill="#2F3A28"/>
    <!-- windows -->
    <rect class="stroke-thin" x="40" y="85" width="40" height="35"/>
    <line class="stroke-thin" x1="60" y1="85" x2="60" y2="120"/>
    <line class="stroke-thin" x1="40" y1="102" x2="80" y2="102"/>
    <rect class="stroke-thin" x="170" y="85" width="40" height="35"/>
    <line class="stroke-thin" x1="190" y1="85" x2="190" y2="120"/>
    <line class="stroke-thin" x1="170" y1="102" x2="210" y2="102"/>
    <!-- log lines -->
    <line class="stroke-thin" x1="30" y1="140" x2="240" y2="140" opacity="0.5"/>
    <line class="stroke-thin" x1="30" y1="155" x2="240" y2="155" opacity="0.5"/>
  </g>
  <text class="label" x="540" y="360">Private Bathrooms</text>
  <text class="label" x="540" y="410">+ Full Bath House</text>

  <!-- ============ ROW 2 RIGHT: Group Camping (tent with trees) ============ -->
  <g transform="translate(900,310)">
    <!-- trees behind -->
    <g opacity="0.85">
      <path class="stroke-thin" d="M30 170 L30 145 M15 145 L30 90 L45 145 Z M20 130 L30 100 L40 130 Z M22 115 L30 95 L38 115 Z"/>
      <path class="stroke-thin" d="M285 170 L285 145 M270 145 L285 80 L300 145 Z M275 130 L285 95 L295 130 Z M277 115 L285 90 L293 115 Z"/>
    </g>
    <!-- ground -->
    <line class="stroke-thin" x1="0" y1="170" x2="330" y2="170"/>
    <!-- tent -->
    <path class="stroke" d="M80 170 L165 50 L250 170 Z"/>
    <!-- tent door -->
    <path class="stroke-thin" d="M165 170 L140 90 M165 170 L190 90"/>
    <!-- pole top -->
    <line class="stroke-thin" x1="165" y1="50" x2="165" y2="40"/>
  </g>
  <text class="label" x="1280" y="360">Group</text>
  <text class="label" x="1280" y="410">Camping</text>

  <!-- ============ ROW 3 LEFT: Electric / AC / Plumbing ============ -->
  <g transform="translate(170,490)">
    <!-- Plug -->
    <g transform="translate(0,20)">
      <path class="stroke" d="M30 30 L30 60 Q30 90 60 90 L70 90 L70 110 M60 90 Q90 90 90 60 L90 30"/>
      <line class="stroke" x1="40" y1="10" x2="40" y2="30"/>
      <line class="stroke" x1="80" y1="10" x2="80" y2="30"/>
    </g>
    <!-- Snowflake -->
    <g transform="translate(140,55)" stroke="#2F3A28" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="40" y1="0" x2="40" y2="80"/>
      <line x1="0" y1="40" x2="80" y2="40"/>
      <line x1="12" y1="12" x2="68" y2="68"/>
      <line x1="68" y1="12" x2="12" y2="68"/>
      <!-- tips -->
      <path d="M34 8 L40 0 L46 8"/>
      <path d="M34 72 L40 80 L46 72"/>
      <path d="M8 34 L0 40 L8 46"/>
      <path d="M72 34 L80 40 L72 46"/>
    </g>
    <!-- Faucet + drop -->
    <g transform="translate(260,30)">
      <path class="stroke" d="M10 30 L70 30 L70 50 L55 50 L55 75"/>
      <rect class="stroke-thin" x="30" y="10" width="30" height="20"/>
      <line class="stroke-thin" x1="45" y1="0" x2="45" y2="10"/>
      <path class="stroke" d="M55 90 Q45 100 55 110 Q65 100 55 90 Z"/>
    </g>
  </g>
  <text class="label" x="540" y="540">Electric, A/C,</text>
  <text class="label" x="540" y="590">&amp; Plumbing</text>

  <!-- ============ ROW 3 RIGHT: Wifi ============ -->
  <g transform="translate(940,490)">
    <path class="stroke" d="M0 90 Q90 -10 180 90" stroke-width="6"/>
    <path class="stroke" d="M30 110 Q90 40 150 110" stroke-width="6"/>
    <path class="stroke" d="M60 130 Q90 95 120 130" stroke-width="6"/>
    <circle cx="90" cy="150" r="10" fill="#2F3A28"/>
  </g>
  <text class="label" x="1280" y="540">Wifi</text>

  <!-- ============ ROW 4 LEFT: Trails & Water Access ============ -->
  <g transform="translate(150,660)">
    <!-- distant mountains -->
    <path class="stroke-thin" d="M0 130 L70 60 L120 100 L170 50 L230 110 L290 130 Z"/>
    <!-- trees -->
    <g>
      <path class="stroke-thin" d="M30 130 L30 110 M15 110 L30 70 L45 110 Z M20 95 L30 75 L40 95 Z"/>
      <path class="stroke-thin" d="M260 130 L260 110 M245 110 L260 65 L275 110 Z M250 95 L260 72 L270 95 Z"/>
    </g>
    <!-- trail -->
    <path class="stroke" d="M30 145 Q90 130 130 145 Q170 160 220 140 Q260 125 290 145"/>
    <!-- ground line -->
    <line class="stroke-thin" x1="0" y1="158" x2="300" y2="158"/>
  </g>
  <text class="label" x="540" y="710">Trails &amp;</text>
  <text class="label" x="540" y="760">Water Access</text>

  <!-- ============ ROW 4 RIGHT: Floating Outfitters / Canoe ============ -->
  <g transform="translate(880,660)">
    <!-- water -->
    <path class="stroke-thin" d="M0 140 Q30 130 60 140 T120 140 T180 140 T240 140 T300 140" opacity="0.6"/>
    <path class="stroke-thin" d="M0 155 Q30 145 60 155 T120 155 T180 155 T240 155 T300 155" opacity="0.4"/>
    <!-- canoe -->
    <path class="stroke" d="M20 100 Q150 145 280 100 Q260 130 150 130 Q40 130 20 100 Z"/>
    <!-- thwarts -->
    <line class="stroke-thin" x1="90" y1="118" x2="90" y2="128"/>
    <line class="stroke-thin" x1="210" y1="118" x2="210" y2="128"/>
    <!-- paddle -->
    <line class="stroke" x1="40" y1="40" x2="100" y2="115"/>
    <path class="stroke" d="M30 25 Q50 45 50 60 Q35 50 30 25 Z"/>
  </g>
  <text class="label" x="1280" y="710">Floating Outfitters</text>
  <text class="label" x="1280" y="760">will pick you up</text>
</svg>
